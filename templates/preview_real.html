<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>

    <!-- SEO / Social -->
    <meta property="og:title" content="{{ titulo }}">
    <meta property="og:description" content="{{ descricao }}">
    <meta property="og:image" content="{{ imagem }}">
    <meta property="og:type" content="{{ tipo }}">
    <meta property="og:url" content="{{ url_real }}">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ url_real }}">

    <!-- Redirecionamento -->
    <meta http-equiv="refresh" content="5;url={{ url_destino }}">

    <!-- Favicon (opcional) -->
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <p>Redirecionando para o site... Se não for redirecionado em 5 segundos, <a href="{{ url_destino }}">clique aqui</a>.</p>
</body>
</html>
